# WS-8.10 — CI pipeline.
#
# Three checks on every PR:
#   1. typecheck         — `tsc --noEmit`.
#   2. test              — vitest, including the build-gated cache audit
#                          + the Postgres integration suites (Testcontainers).
#   3. build             — `next build`.
#
# Postgres for integration tests is provided as a service container so the
# Testcontainers `postgres:16` start-up is a no-op when DATABASE_URL is
# already set to the service. (Local devs without Docker still skip the
# integration suites; CI runs them by default.)

name: ci

on:
  pull_request:
    branches: [main, "ws-*"]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bearcamp
          POSTGRES_PASSWORD: bearcamp
          POSTGRES_DB: bearcamp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bearcamp -d bearcamp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://bearcamp:bearcamp@localhost:5432/bearcamp
      DIRECT_URL: postgresql://bearcamp:bearcamp@localhost:5432/bearcamp
      BEARCAMP_BACKEND: memory
      BEARCAMP_RUN_BUILD_TESTS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    env:
      DATABASE_URL: postgresql://bearcamp:bearcamp@localhost:5432/bearcamp
      DIRECT_URL: postgresql://bearcamp:bearcamp@localhost:5432/bearcamp
      BEARCAMP_BACKEND: memory
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec next build
